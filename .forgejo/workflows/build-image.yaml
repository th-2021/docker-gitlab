name: Build docker-gitlab image 
on: [push]
jobs:
  build-image:
    runs-on: docker
    steps:
      - name: Code herunterladen
        uses: https://code.forgejo.org/senyai/checkout@main
        with:
          ref: 'support-builtin-kas'
      - name: Docker login
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}
      - name: Docker create builder
        run: |
          docker buildx create --name imagebuilder --driver=remote tcp://${{ vars.BUILD_HOST }}:1234 --bootstrap --use
      - name: Docker buildx
        run: |
          docker buildx build --no-cache --tag  ${{ secrets.REGISTRY_URL }}/${{ secrets.REGISTRY_USERNAME }}/docker-gitlab:`cat VERSION` --push \
          --provenance=false \
          --build-arg BUILD_DATE="$(date +"%Y-%m-%d %H:%M:%S%:z")" \
          --build-arg VCS_REF=$(git rev-parse --short HEAD) \
            -f Dockerfile .
          #--build-arg BUILDKIT_INLINE_CACHE=1 \
          #--cache-from type=registry,ref=tom-ml351.31fakduva17kuk73.myfritz.net/thiller/docker-gitlab:buildcache \
          #--cache-to type=registry,ref=tom-ml351.31fakduva17kuk73.myfritz.net/thiller/docker-gitlab:buildcache,mode=max,image-manifest=true 

